services:
    redis:
        image: redis:7-alpine
        ports:
            - "6379:6379"

    backend:
        build: ./backend
        depends_on:
            - redis
        env_file:
            - .env
        ports:
            - "${PORT:-8080}:8080"

    frontend:
        build: ./frontend
        depends_on:
            - backend
        environment:
            BACKEND_URL: http://backend:8080
        ports:
            - "8501:8501"
