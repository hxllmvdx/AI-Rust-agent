services:
    redis:
        image: redis:7-alpine
        ports:
            - "6379:6379"

    backend:
        build: ./backend
        env_file:
            - .env
        environment:
            OLLAMA_URL: http://host.docker.internal:11434
            OLLAMA_BASE_URL: http://host.docker.internal:11434
        ports:
            - "${PORT:-8080}:8080"
        depends_on:
            - redis

    frontend:
        build: ./frontend
        depends_on:
            - backend
        environment:
            BACKEND_URL: http://backend:8080
        ports:
            - "8501:8501"
